<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime gallary</title>
</head>


  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    iframe {
      border-radius: 10px;
      margin-top: 20px;
    }

    .gallery {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .gallery img {
      width: 200px;
      cursor: pointer;
      border-radius: 10px;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px white;
    }
  </style>


<body>
    <div>
  <iframe
    id="videoPlayer"
    width="370"
    height="658"
    src=""
    allowfullscreen>
  </iframe>
</div>

<!-- 🖼️ IMAGE GALLERY -->
<div class="gallery">
  <img src="onepiece.jpg" />
  <img src="chainsawman.jpg" />
</div>


</body>
</html>
