<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch to Unlock</title>
    <link rel="stylesheet" href="watchtime.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 30px;
        }

        #player-container {
            margin: 40px auto;
        }

        .button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #22c55e;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }

        .button:disabled {
            background-color: gray;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<h1>🎮 Unlock Your Character</h1>

<div id="player-container">
    <div id="player"></div>
</div>

<p id="status">⏳ Watch the full video to unlock</p>

<button id="unlockBtn" class="button" disabled>
    🔒 Locked
</button>

<br>

<a href="display-of-videos.html">
    <button class="button">Watch More Videos</button>
</a>

<script>
    let tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    function onYouTubeIframeAPIReady(){
        player = new YT.Player('player', {
          height: '390',
          width: '640',
          videoId: 'DV0gU6t7hNysV4df',
          playerVars: {
            'playsinline': 1
          },
          events: {
            'onReady': onPlayerReady,
            'onStateChange': onPlayerStateChange
          }
        });
    }


    function unlockCharacter() {
        document.getElementById('unlockBtn').disabled = false;
        document.getElementById('unlockBtn').textContent = '🔓 Unlocked';
        document.getElementById('status').textContent = '✅ Character Unlocked!';
    }
    
    function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
        unlockCharacter();
    }
}

    unlockCharacter();
</script>

</body>
</html>
